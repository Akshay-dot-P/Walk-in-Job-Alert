# .github/workflows/resume_tailor.yml
name: Resume Tailor

on:
  schedule:
    - cron: '30 2,7,13 * * *'  # 8 AM, 1 PM, 7 PM IST
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install LibreOffice (for PDF generation)
        run: sudo apt-get install -y libreoffice
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install gspread google-auth requests reportlab groq
          pip install -r requirements.txt
          pip install python-docx==1.1.2 google-api-python-client==2.108.0 beautifulsoup4==4.12.3
      
      - name: Generate tailored resumes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python resume_tailor.py
      
      - name: Create release tag
        id: create_tag
        run: |
          TAG_NAME="resumes-$(date +%Y-%m-%d-%H-%M-%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Created tag: $TAG_NAME"
      
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          release_name: "Tailored Resumes - ${{ steps.create_tag.outputs.tag_name }}"
          body: "Automatically generated tailored resumes for cybersecurity job applications"
          draft: false
          prerelease: false
      
      - name: Upload PDFs to release
        run: |
          UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          # Remove the {?name,label} suffix from upload URL
          UPLOAD_URL="${UPLOAD_URL%\{*}"
          
          for pdf in $RUNNER_TEMP/generated_resumes/*.pdf; do
            if [ -f "$pdf" ]; then
              filename=$(basename "$pdf")
              echo "Uploading: $filename"
              
              curl \
                -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: application/pdf" \
                --data-binary @"$pdf" \
                "${UPLOAD_URL}?name=${filename}"
            fi
          done
      
      - name: Update Google Sheet with download links
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          RELEASE_TAG: ${{ steps.create_tag.outputs.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python update_sheet_with_links.py
