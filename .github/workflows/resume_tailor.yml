name: Resume Tailor

on:
  workflow_run:
    workflows: ["Walk-in Job Scanner"]   # Make sure this matches your main workflow name
    types: [completed]
  workflow_dispatch:

jobs:
  tailor:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          run: pip install gspread reportlab requests
          pip install gspread google-auth requests reportlab groq

      - name: Run resume tailor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
        run: python resume_tailor.py
